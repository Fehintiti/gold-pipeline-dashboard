<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Precious Metals Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@500;600;700;800&family=Poppins:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0C1017;--bg2:#121820;--bg3:#181F2B;--bg4:#1E2738;
  --border:#232D3F;--border-light:#2A3650;
  --text1:#EEF1F6;--text2:#B8C0D0;--text3:#7A8499;--axis:#C8D0DE;
  --gold:#E2B04A;--gold-bright:#F5D06A;--gold-dim:#A07828;
  --silver:#8D9BB0;--teal:#3ECFB2;--purple:#B07AFF;
  --green:#2DD4A0;--red:#FF6B81;--blue:#5B9CF6;
  --accent-bg:rgba(226,176,74,0.04);--accent-border:rgba(226,176,74,0.12);
}
[data-theme="light"] {
  --bg:#F5F5F0;--bg2:#EDEDEA;--bg3:#FFFFFF;--bg4:#FFFFFF;
  --border:#D8D8D2;--border-light:#C8C8C0;
  --text1:#1A1A18;--text2:#4A4A46;--text3:#7A7A74;--axis:#2A2A28;
  --gold:#9A7020;--gold-bright:#B8860B;--gold-dim:#6E5010;
  --silver:#5A6270;--teal:#0A8F78;--purple:#7C3AED;
  --green:#0A8060;--red:#D03050;--blue:#2563EB;
  --accent-bg:rgba(154,112,32,0.04);--accent-border:rgba(154,112,32,0.15);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;transition:all .5s}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/%3E%3C/svg%3E");opacity:0.04;pointer-events:none;z-index:9999}
[data-theme="light"] body::before{opacity:0.025}
.wrap{max-width:1600px;margin:0 auto;padding:32px 48px}
.loading{text-align:center;padding:80px 0;font-family:'Inter',sans-serif;font-size:16px;color:var(--text3)}
.loading span{color:var(--gold);font-weight:600}

/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:32px;padding-bottom:22px;border-bottom:1px solid var(--border);position:relative}
.hdr::after{content:'';position:absolute;bottom:-1px;left:0;width:140px;height:2px;background:var(--gold)}
.hdr-title{font-family:'Poppins',sans-serif;font-size:32px;font-weight:800;letter-spacing:-0.8px;color:var(--text1);transition:color .5s}
.hdr-title em{font-style:normal;color:var(--gold);position:relative}
.hdr-title em::after{content:'';position:absolute;bottom:2px;left:0;right:0;height:2px;background:var(--gold);opacity:0.3}
.hdr-sub{font-family:'Inter',sans-serif;font-size:14px;color:var(--text3);margin-top:6px;font-weight:600;transition:color .5s}
.hdr-right{display:flex;align-items:center;gap:14px}
.pill{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;padding:8px 16px;border-radius:18px;transition:all .5s}
.pill-live{color:var(--green);background:rgba(45,212,160,0.08);border:1px solid rgba(45,212,160,0.2);display:flex;align-items:center;gap:7px}
.pill-live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.pill-count{color:var(--text3);background:var(--bg2);border:1px solid var(--border)}
.tog{width:48px;height:26px;border-radius:13px;background:var(--bg3);border:1px solid var(--border);position:relative;cursor:pointer;transition:all .4s}
.tog-dot{width:20px;height:20px;border-radius:50%;background:var(--gold);position:absolute;top:2px;left:2px;transition:all .4s cubic-bezier(0.68,-0.15,0.27,1.15);box-shadow:0 1px 4px rgba(226,176,74,0.3)}
[data-theme="light"] .tog-dot{left:24px}

/* HERO */
.hero{display:grid;grid-template-columns:320px 1fr;gap:18px;margin-bottom:24px}
.gold-hero{background:var(--bg2);border:2px solid var(--border);border-radius:18px;padding:28px;position:relative;overflow:hidden;transition:all .5s}
.gold-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(226,176,74,0.08) 0%,transparent 70%);border-radius:50%}
.gold-hero-label{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;transition:color .5s}
.gold-hero-price{font-family:'Roboto Mono',monospace;font-size:46px;font-weight:700;color:var(--gold-bright);letter-spacing:-1px;margin-bottom:6px;transition:color .5s}
[data-theme="light"] .gold-hero-price{color:var(--gold)}
.gold-hero-sub{font-family:'Inter',sans-serif;font-size:15px;color:var(--text3);margin-bottom:22px;font-weight:700;transition:color .5s}
.ghs{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid var(--border);transition:border-color .5s}
.ghs-l{font-family:'Inter',sans-serif;font-size:13px;color:var(--text2);font-weight:700;transition:color .5s}
.ghs-v{font-family:'Roboto Mono',monospace;font-size:14px;font-weight:700;color:var(--text1);transition:color .5s}
.metals-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.mcard{background:var(--bg2);border:2px solid var(--border);border-radius:14px;padding:22px 24px;position:relative;overflow:hidden;transition:all .4s}
.mcard:hover{border-color:var(--border-light);transform:translateY(-1px)}
.mcard-accent{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:14px 0 0 14px}
.mcard-name{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text2);margin-bottom:12px;transition:color .5s}
.mcard-price{font-family:'Roboto Mono',monospace;font-size:26px;font-weight:700;margin-bottom:8px;transition:color .5s}
.mcard-chg{font-family:'Inter',sans-serif;font-size:14px;font-weight:700}

/* CHART */
.chart-section{background:var(--bg2);border:2px solid var(--border);border-radius:18px;padding:28px;margin-bottom:24px;transition:all .5s}
.chart-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.chart-title{font-family:'Poppins',sans-serif;font-size:22px;font-weight:800;color:var(--text1);transition:color .5s}
.chart-desc{font-family:'Inter',sans-serif;font-size:14px;color:var(--text2);margin-top:3px;font-weight:700;transition:color .5s}
.chart-legend{display:flex;gap:20px;align-items:center}
.cleg{display:flex;align-items:center;gap:6px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;color:var(--text2);transition:color .5s}
.cleg-dot{width:12px;height:3px;border-radius:2px}
#priceChart{width:100%;height:340px;border-radius:8px}

/* ANALYSIS */
.analysis{display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:18px;margin-bottom:24px}
.acard{background:var(--bg2);border:2px solid var(--border);border-radius:16px;padding:24px;transition:all .5s}
.acard-title{font-family:'Poppins',sans-serif;font-size:18px;font-weight:800;color:var(--text1);margin-bottom:3px;transition:color .5s}
.acard-sub{font-family:'Inter',sans-serif;font-size:13px;color:var(--text2);margin-bottom:18px;font-weight:700;transition:color .5s}
.corr-grid{display:grid;grid-template-columns:42px repeat(4,1fr);gap:4px}
.corr-label{font-family:'Montserrat',sans-serif;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:color .5s}
.corr-cell{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Roboto Mono',monospace;font-size:13px;font-weight:700;color:var(--text1);min-height:50px;transition:all .3s;cursor:default}
.corr-cell:hover{transform:scale(1.06);z-index:2}
.editorial{background:var(--accent-bg);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:14px 18px;margin-bottom:8px}
.editorial:last-child{margin-bottom:0}
.editorial-label{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin-bottom:6px;transition:color .5s}
.editorial-text{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text2);line-height:1.65;font-weight:500;transition:color .5s}
.editorial-text b{color:var(--text1);font-weight:800;transition:color .5s}
.curr-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);transition:border-color .5s}
.curr-item:last-child{border-bottom:none}
.curr-code{font-family:'Roboto Mono',monospace;font-size:13px;font-weight:700;width:34px;color:var(--text2);transition:color .5s}
.curr-track{flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;transition:background .5s}
.curr-fill{height:100%;border-radius:4px;transition:width .8s ease}
.curr-pct{font-family:'Roboto Mono',monospace;font-size:13px;font-weight:700;width:52px;text-align:right}
.ks-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);transition:border-color .5s}
.ks-row:last-child{border-bottom:none}
.ks-l{font-family:'Inter',sans-serif;font-size:13px;color:var(--text2);font-weight:700;transition:color .5s}
.ks-v{font-family:'Roboto Mono',monospace;font-size:13px;font-weight:700;color:var(--text1);transition:color .5s}

/* FOOTER */
.ftr{display:flex;justify-content:space-between;align-items:center;padding-top:18px;border-top:1px solid var(--border);transition:border-color .5s}
.ftr-text{font-family:'Inter',sans-serif;font-size:13px;color:var(--text3);transition:color .5s}
.ftr-tags{display:flex;gap:8px}
.ftr-tag{font-family:'Roboto Mono',monospace;font-size:10px;font-weight:500;color:var(--text3);background:var(--bg3);border:1px solid var(--border);padding:4px 10px;border-radius:4px;transition:all .5s}

/* MOBILE RESPONSIVE */
@media (max-width: 900px) {
  .wrap{padding:18px 16px}
  .hdr{flex-direction:column;align-items:flex-start;gap:12px}
  .hdr-title{font-size:24px}
  .hdr-right{width:100%;justify-content:flex-start;flex-wrap:wrap;gap:8px}
  .hero{grid-template-columns:1fr;gap:14px}
  .gold-hero-price{font-size:36px}
  .metals-strip{grid-template-columns:1fr}
  .mcard{padding:18px 20px}
  .mcard-price{font-size:24px}
  .chart-section{padding:18px}
  .chart-top{flex-direction:column;gap:8px}
  .chart-title{font-size:18px}
  #priceChart{height:260px}
  .analysis{grid-template-columns:1fr;gap:14px}
  .acard{padding:18px}
  .acard-title{font-size:16px}
  .corr-grid{gap:3px}
  .corr-cell{min-height:42px;font-size:12px}
  .corr-label{font-size:11px}
  .editorial{padding:12px 14px}
  .editorial-text{font-size:13px}
  .ftr{flex-direction:column;align-items:flex-start;gap:10px}
  .ftr-tags{flex-wrap:wrap}
}

@media (max-width: 480px) {
  .wrap{padding:14px 12px}
  .hdr-title{font-size:20px}
  .hdr-sub{font-size:11px}
  .pill{font-size:9px;padding:5px 10px}
  .gold-hero{padding:18px}
  .gold-hero-label{font-size:10px}
  .gold-hero-price{font-size:30px}
  .gold-hero-sub{font-size:13px}
  .ghs-l{font-size:12px}
  .ghs-v{font-size:12px}
  .mcard-name{font-size:10px}
  .mcard-price{font-size:20px}
  .mcard-chg{font-size:12px}
  .chart-title{font-size:16px}
  .chart-desc{font-size:12px}
  #priceChart{height:220px}
  .cleg{font-size:10px}
  .acard-title{font-size:15px}
  .acard-sub{font-size:11px}
  .corr-grid{grid-template-columns:30px repeat(4,1fr);gap:2px}
  .corr-cell{min-height:36px;font-size:10px}
  .corr-label{font-size:9px}
  .editorial-label{font-size:9px}
  .editorial-text{font-size:12px}
  .curr-code{font-size:10px}
  .curr-pct{font-size:10px}
  .ks-l{font-size:11px}
  .ks-v{font-size:11px}
  .ftr-text{font-size:10px}
  .ftr-tag{font-size:8px;padding:3px 6px}
}
</style>
</head>
<body data-theme="dark">
<div class="wrap">
  <div class="hdr">
    <div>
      <div class="hdr-title">Precious Metals <em>Intelligence</em></div>
      <div class="hdr-sub">Automated AWS Pipeline &middot; Updated daily at 08:00 UTC</div>
    </div>
    <div class="hdr-right">
      <div class="pill pill-live">Pipeline Active</div>
      <div class="pill pill-count" id="daysBadge">-- days</div>
      <div class="tog" onclick="toggleTheme()"><div class="tog-dot"></div></div>
    </div>
  </div>

  <div id="dashboard">
    <div class="loading">Fetching live data from AWS S3... <span>&#9671;</span></div>
  </div>

  <div class="ftr">
    <div class="ftr-text">Built by Fehintiti &middot; Data via Metals.Dev API</div>
    <div class="ftr-tags">
      <span class="ftr-tag">Lambda</span><span class="ftr-tag">S3</span>
      <span class="ftr-tag">EventBridge</span><span class="ftr-tag">Athena</span>
      <span class="ftr-tag">JS</span>
    </div>
  </div>
</div>

<script>
const CSV_URL = 'https://gold-price-pipeline-fehintiti.s3.eu-north-1.amazonaws.com/Processed/gold_prices_clean.csv';

function toggleTheme() {
  const b = document.body;
  b.setAttribute('data-theme', b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  if (window._chartData) drawChart(window._chartData);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = vals[i]?.trim());
    return obj;
  }).filter(r => r.date && r.gold)
    .map(r => ({
      date: r.date, source: r.source,
      gold: +r.gold, silver: +r.silver, platinum: +r.platinum, palladium: +r.palladium,
      usd_gbp: +r.usd_gbp, usd_eur: +r.usd_eur, usd_jpy: +r.usd_jpy,
      usd_cad: +r.usd_cad, usd_aud: +r.usd_aud
    })).sort((a, b) => a.date.localeCompare(b.date));
}

function calcStats(data, key) {
  const vals = data.map(d => d[key]);
  const first = vals[0], last = vals[vals.length - 1];
  const max = Math.max(...vals), min = Math.min(...vals);
  const maxDate = data[vals.indexOf(max)].date;
  const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
  const ytdPct = ((last - first) / first) * 100;
  return { first, last, max, min, maxDate, avg, ytdPct };
}

function calcCorrelation(x, y) {
  const n = x.length;
  const mx = x.reduce((a, b) => a + b, 0) / n;
  const my = y.reduce((a, b) => a + b, 0) / n;
  let num = 0, dx = 0, dy = 0;
  for (let i = 0; i < n; i++) {
    const xi = x[i] - mx, yi = y[i] - my;
    num += xi * yi; dx += xi * xi; dy += yi * yi;
  }
  return dx && dy ? num / Math.sqrt(dx * dy) : 0;
}

function findBiggestDrop(data, key) {
  let maxDrop = 0, dropDate = '';
  for (let i = 1; i < data.length; i++) {
    const pct = ((data[i][key] - data[i-1][key]) / data[i-1][key]) * 100;
    if (pct < maxDrop) { maxDrop = pct; dropDate = data[i].date; }
  }
  return { pct: maxDrop, date: dropDate };
}

function findMostVolatileMonth(data, key) {
  const months = {};
  data.forEach(d => {
    const m = d.date.substring(0, 7);
    if (!months[m]) months[m] = [];
    months[m].push(d[key]);
  });
  let maxRange = 0, maxMonth = '';
  for (const [m, vals] of Object.entries(months)) {
    const range = Math.max(...vals) - Math.min(...vals);
    if (range > maxRange) { maxRange = range; maxMonth = m; }
  }
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const monthName = monthNames[parseInt(maxMonth.split('-')[1]) - 1];
  return { month: monthName, range: maxRange };
}

function avgDailyMove(data, key) {
  let total = 0;
  for (let i = 1; i < data.length; i++) {
    total += Math.abs((data[i][key] - data[i-1][key]) / data[i-1][key]) * 100;
  }
  return total / (data.length - 1);
}

function fmt(n, dec = 0) { return n.toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec }); }
function fmtPct(n) { return (n >= 0 ? '+' : '') + n.toFixed(1) + '%'; }
function monthName(dateStr) {
  const m = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return m[parseInt(dateStr.split('-')[1]) - 1];
}

function corrColor(val, base) {
  const alpha = Math.abs(val) * 0.45;
  return base.replace(')', `,${alpha})`).replace('rgb', 'rgba');
}

function drawChart(data, hoverIdx) {
  const canvas = document.getElementById('priceChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 10, right: 20, bottom: 30, left: 55 };
  const cw = W - pad.left - pad.right, ch = H - pad.top - pad.bottom;
  window._chartParams = { pad, cw, ch, W, H, data };

  const goldVals = data.map(d => d.gold);
  const silverScaled = data.map(d => d.silver * 60);
  const allVals = [...goldVals, ...silverScaled];
  const yMin = Math.floor(Math.min(...goldVals) / 100) * 100 - 100;
  const yMax = Math.ceil(Math.max(...allVals) / 100) * 100 + 100;

  const cs = getComputedStyle(document.body);
  const colAxis = cs.getPropertyValue('--axis').trim();
  const colBorder = cs.getPropertyValue('--border').trim();
  const colGold = cs.getPropertyValue('--gold').trim();
  const colSilver = cs.getPropertyValue('--silver').trim();
  const colBg = cs.getPropertyValue('--bg').trim();
  const colBg2 = cs.getPropertyValue('--bg2').trim();
  const colRed = cs.getPropertyValue('--red').trim();
  const colText1 = cs.getPropertyValue('--text1').trim();
  const colText3 = cs.getPropertyValue('--text3').trim();

  ctx.clearRect(0, 0, W, H);

  const gridSteps = 5;
  ctx.strokeStyle = colBorder; ctx.lineWidth = 0.5;
  ctx.font = '700 12px "Roboto Mono"'; ctx.fillStyle = colAxis; ctx.textAlign = 'right';
  for (let i = 0; i <= gridSteps; i++) {
    const y = pad.top + (ch / gridSteps) * i;
    const val = yMax - ((yMax - yMin) / gridSteps) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillText(fmt(val), pad.left - 8, y + 5);
  }

  ctx.font = '700 13px "Inter"'; ctx.textAlign = 'center'; ctx.fillStyle = colAxis;
  let prevMonth = '';
  data.forEach((d, i) => {
    const m = d.date.substring(0, 7);
    if (m !== prevMonth) {
      const x = pad.left + (i / (data.length - 1)) * cw;
      const mName = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m.split('-')[1]) - 1];
      ctx.fillText(mName, x, H - 8);
      if (prevMonth) {
        ctx.save(); ctx.strokeStyle = colBorder; ctx.setLineDash([4, 4]); ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(x, pad.top); ctx.lineTo(x, pad.top + ch); ctx.stroke();
        ctx.restore();
      }
      prevMonth = m;
    }
  });

  function toXY(i, val) {
    return [pad.left + (i / (data.length - 1)) * cw, pad.top + ((yMax - val) / (yMax - yMin)) * ch];
  }

  ctx.beginPath();
  data.forEach((d, i) => { const [x, y] = toXY(i, d.gold); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
  ctx.lineTo(pad.left + cw, pad.top + ch); ctx.lineTo(pad.left, pad.top + ch); ctx.closePath();
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
  grad.addColorStop(0, colGold + '25'); grad.addColorStop(1, colGold + '03');
  ctx.fillStyle = grad; ctx.fill();

  ctx.beginPath();
  data.forEach((d, i) => { const [x, y] = toXY(i, d.gold); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
  ctx.strokeStyle = colGold; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();

  ctx.beginPath();
  data.forEach((d, i) => { const [x, y] = toXY(i, d.silver * 60); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
  ctx.strokeStyle = colSilver; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.5;
  ctx.setLineDash([5, 4]); ctx.stroke(); ctx.setLineDash([]); ctx.globalAlpha = 1;

  const peakIdx = goldVals.indexOf(Math.max(...goldVals));
  const [px, py] = toXY(peakIdx, data[peakIdx].gold);
  ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI * 2);
  ctx.fillStyle = colGold; ctx.fill(); ctx.strokeStyle = colBg; ctx.lineWidth = 2.5; ctx.stroke();

  let worstPct = 0, worstIdx = 0;
  for (let i = 1; i < data.length; i++) {
    const pct = ((data[i].gold - data[i-1].gold) / data[i-1].gold) * 100;
    if (pct < worstPct) { worstPct = pct; worstIdx = i; }
  }
  const [cx2, cy2] = toXY(worstIdx, data[worstIdx].gold);
  ctx.beginPath(); ctx.arc(cx2, cy2, 5, 0, Math.PI * 2);
  ctx.fillStyle = colRed; ctx.fill(); ctx.strokeStyle = colBg; ctx.lineWidth = 2.5; ctx.stroke();

  const [lx, ly] = toXY(data.length - 1, data[data.length - 1].gold);
  ctx.beginPath(); ctx.arc(lx, ly, 6, 0, Math.PI * 2);
  ctx.fillStyle = colGold; ctx.fill(); ctx.strokeStyle = colBg; ctx.lineWidth = 2.5; ctx.stroke();

  // HOVER TOOLTIP
  if (hoverIdx !== undefined && hoverIdx >= 0 && hoverIdx < data.length) {
    const d = data[hoverIdx];
    const [hx, hy] = toXY(hoverIdx, d.gold);
    const [sx, sy] = toXY(hoverIdx, d.silver * 60);

    // Vertical crosshair line
    ctx.beginPath(); ctx.moveTo(hx, pad.top); ctx.lineTo(hx, pad.top + ch);
    ctx.strokeStyle = colGold; ctx.lineWidth = 1; ctx.globalAlpha = 0.35;
    ctx.setLineDash([3, 3]); ctx.stroke(); ctx.setLineDash([]); ctx.globalAlpha = 1;

    // Gold hover dot
    ctx.beginPath(); ctx.arc(hx, hy, 6, 0, Math.PI * 2);
    ctx.fillStyle = colGold; ctx.fill(); ctx.strokeStyle = colBg; ctx.lineWidth = 2.5; ctx.stroke();

    // Silver hover dot
    ctx.beginPath(); ctx.arc(sx, sy, 4, 0, Math.PI * 2);
    ctx.fillStyle = colSilver; ctx.fill(); ctx.strokeStyle = colBg; ctx.lineWidth = 2; ctx.stroke();

    // Tooltip box
    const tipW = 185, tipH = 68;
    let tipX = hx + 16, tipY = hy - tipH / 2;
    if (tipX + tipW > W - pad.right) tipX = hx - tipW - 16;
    if (tipY < pad.top) tipY = pad.top;
    if (tipY + tipH > pad.top + ch) tipY = pad.top + ch - tipH;

    ctx.shadowColor = 'rgba(0,0,0,0.25)'; ctx.shadowBlur = 14; ctx.shadowOffsetY = 4;
    // Manual rounded rect (compatible with all browsers)
    const r = 8;
    ctx.beginPath();
    ctx.moveTo(tipX + r, tipY);
    ctx.lineTo(tipX + tipW - r, tipY);
    ctx.quadraticCurveTo(tipX + tipW, tipY, tipX + tipW, tipY + r);
    ctx.lineTo(tipX + tipW, tipY + tipH - r);
    ctx.quadraticCurveTo(tipX + tipW, tipY + tipH, tipX + tipW - r, tipY + tipH);
    ctx.lineTo(tipX + r, tipY + tipH);
    ctx.quadraticCurveTo(tipX, tipY + tipH, tipX, tipY + tipH - r);
    ctx.lineTo(tipX, tipY + r);
    ctx.quadraticCurveTo(tipX, tipY, tipX + r, tipY);
    ctx.closePath();
    ctx.fillStyle = colBg2; ctx.fill();
    ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
    ctx.strokeStyle = colBorder; ctx.lineWidth = 1; ctx.stroke();

    ctx.textAlign = 'left';
    ctx.font = '600 12px "Inter"'; ctx.fillStyle = colText3;
    ctx.fillText(d.date, tipX + 14, tipY + 20);

    ctx.font = '700 16px "Roboto Mono"'; ctx.fillStyle = colGold;
    ctx.fillText('Au $' + d.gold.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}), tipX + 14, tipY + 42);

    ctx.font = '600 13px "Roboto Mono"'; ctx.fillStyle = colSilver;
    ctx.fillText('Ag $' + d.silver.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}), tipX + 14, tipY + 60);
  }
}

function setupChartHover() {
  const canvas = document.getElementById('priceChart');
  if (!canvas) return;
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const p = window._chartParams;
    if (!p) return;
    const dataX = mouseX - p.pad.left;
    if (dataX < 0 || dataX > p.cw) { drawChart(p.data); canvas.style.cursor = 'default'; return; }
    const idx = Math.round((dataX / p.cw) * (p.data.length - 1));
    canvas.style.cursor = 'crosshair';
    drawChart(p.data, Math.max(0, Math.min(p.data.length - 1, idx)));
  });
  canvas.addEventListener('mouseleave', () => {
    const p = window._chartParams;
    if (p) drawChart(p.data);
    canvas.style.cursor = 'default';
  });
}

async function init() {
  try {
    const res = await fetch(CSV_URL);
    const text = await res.text();
    const data = parseCSV(text);
    if (!data.length) throw new Error('No data');

    window._chartData = data;
    document.getElementById('daysBadge').textContent = data.length + ' days';

    const gs = calcStats(data, 'gold');
    const ss = calcStats(data, 'silver');
    const ps = calcStats(data, 'platinum');
    const pds = calcStats(data, 'palladium');

    const vol = findMostVolatileMonth(data, 'gold');
    const drop = findBiggestDrop(data, 'gold');
    const dailyMove = avgDailyMove(data, 'gold');

    // Correlations
    const cGS = calcCorrelation(data.map(d=>d.gold), data.map(d=>d.silver));
    const cGPt = calcCorrelation(data.map(d=>d.gold), data.map(d=>d.platinum));
    const cGPd = calcCorrelation(data.map(d=>d.gold), data.map(d=>d.palladium));
    const cSPt = calcCorrelation(data.map(d=>d.silver), data.map(d=>d.platinum));
    const cSPd = calcCorrelation(data.map(d=>d.silver), data.map(d=>d.palladium));
    const cPtPd = calcCorrelation(data.map(d=>d.platinum), data.map(d=>d.palladium));

    // Currency returns
    const first = data[0], last = data[data.length - 1];
    const goldGBP_first = first.gold / first.usd_gbp, goldGBP_last = last.gold / last.usd_gbp;
    const goldEUR_first = first.gold / first.usd_eur, goldEUR_last = last.gold / last.usd_eur;
    const goldCAD_first = first.gold / first.usd_cad, goldCAD_last = last.gold / last.usd_cad;
    const goldAUD_first = first.gold / first.usd_aud, goldAUD_last = last.gold / last.usd_aud;
    const retUSD = gs.ytdPct;
    const retGBP = ((goldGBP_last - goldGBP_first) / goldGBP_first) * 100;
    const retEUR = ((goldEUR_last - goldEUR_first) / goldEUR_first) * 100;
    const retCAD = ((goldCAD_last - goldCAD_first) / goldCAD_first) * 100;
    const retAUD = ((goldAUD_last - goldAUD_first) / goldAUD_first) * 100;

    const currReturns = [
      { code: 'EUR', ret: retEUR, color: 'var(--teal)' },
      { code: 'GBP', ret: retGBP, color: 'var(--gold)' },
      { code: 'CAD', ret: retCAD, color: 'var(--purple)' },
      { code: 'USD', ret: retUSD, color: 'var(--silver)' },
      { code: 'AUD', ret: retAUD, color: 'var(--text3)' }
    ].sort((a, b) => b.ret - a.ret);
    const maxRet = currReturns[0].ret;

    // Find strongest and weakest correlation pairs
    const corrPairs = [
      { pair: 'Platinum and Palladium', val: cPtPd },
      { pair: 'Silver and Platinum', val: cSPt },
      { pair: 'Silver and Palladium', val: cSPd },
      { pair: 'Gold and Silver', val: cGS },
      { pair: 'Gold and Palladium', val: cGPd },
      { pair: 'Gold and Platinum', val: cGPt }
    ].sort((a, b) => b.val - a.val);
    const strongest = corrPairs[0];
    const weakest = corrPairs[corrPairs.length - 1];

    // Best currency for insight
    const bestCurr = currReturns[0];
    const worstCurr = currReturns[currReturns.length - 1];

    function chgHTML(pct) {
      return pct >= 0
        ? `<span style="color:var(--green);font-weight:700">&#9650; ${fmtPct(pct)}</span>`
        : `<span style="color:var(--red);font-weight:700">&#9660; ${fmtPct(pct)}</span>`;
    }

    function metalCard(name, stats, accentVar) {
      return `<div class="mcard">
        <div class="mcard-accent" style="background:var(--${accentVar})"></div>
        <div class="mcard-name">${name}</div>
        <div class="mcard-price" style="color:var(--${accentVar})">$${fmt(stats.last, name==='Silver'?2:0)}</div>
        <div class="mcard-chg">${chgHTML(stats.ytdPct)} YTD</div>
        <div style="margin-top:10px">
          <div class="ghs"><span class="ghs-l">YTD High</span><span class="ghs-v" style="color:var(--green)">$${fmt(stats.max, name==='Silver'?2:0)}</span></div>
          <div class="ghs"><span class="ghs-l">YTD Low</span><span class="ghs-v" style="color:var(--red)">$${fmt(stats.min, name==='Silver'?2:0)}</span></div>
          <div class="ghs"><span class="ghs-l">Peak Date</span><span class="ghs-v">${stats.maxDate.substring(5).replace('-',' ').replace(/^0/,'').replace(' 0',' ')}</span></div>
          <div class="ghs"><span class="ghs-l">Avg Price</span><span class="ghs-v">$${fmt(stats.avg, name==='Silver'?2:0)}</span></div>
        </div>
      </div>`;
    }

    function corrCellHTML(val, baseRGB) {
      const alpha = (Math.abs(val) * 0.4 + 0.05).toFixed(2);
      return `<div class="corr-cell" style="background:rgba(${baseRGB},${alpha})">${val.toFixed(2)}</div>`;
    }

    const peakMonth = monthName(gs.maxDate);

    const html = `
    <div class="hero">
      <div class="gold-hero">
        <div class="gold-hero-label">&#9671; Gold / Troy Ounce</div>
        <div class="gold-hero-price">$${fmt(gs.last)}</div>
        <div class="gold-hero-sub">${chgHTML(gs.ytdPct)} &nbsp;year to date</div>
        <div>
          <div class="ghs"><span class="ghs-l">YTD High</span><span class="ghs-v" style="color:var(--green)">$${fmt(gs.max)}</span></div>
          <div class="ghs"><span class="ghs-l">YTD Low</span><span class="ghs-v" style="color:var(--red)">$${fmt(gs.min)}</span></div>
          <div class="ghs"><span class="ghs-l">Peak Date</span><span class="ghs-v">${gs.maxDate.substring(5).replace('-',' ').replace(/^0/,'').replace(' 0',' ')}</span></div>
          <div class="ghs"><span class="ghs-l">Avg Price</span><span class="ghs-v">$${fmt(gs.avg)}</span></div>
        </div>
      </div>
      <div class="metals-strip">
        ${metalCard('Silver', ss, 'silver')}
        ${metalCard('Platinum', ps, 'teal')}
        ${metalCard('Palladium', pds, 'purple')}
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-top">
        <div>
          <div class="chart-title">Price History</div>
          <div class="chart-desc">Daily gold and silver prices, USD per troy ounce</div>
        </div>
        <div class="chart-legend">
          <div class="cleg"><div class="cleg-dot" style="background:var(--gold)"></div> Gold</div>
          <div class="cleg"><div class="cleg-dot" style="background:var(--silver)"></div> Silver x60</div>
        </div>
      </div>
      <canvas id="priceChart"></canvas>
    </div>

    <div class="analysis">
      <div class="acard">
        <div class="acard-title">Correlations</div>
        <div class="acard-sub">How tightly do metals move together?</div>
        <div class="corr-grid">
          <div></div>
          <div class="corr-label" style="color:var(--gold)">Au</div>
          <div class="corr-label" style="color:var(--silver)">Ag</div>
          <div class="corr-label" style="color:var(--teal)">Pt</div>
          <div class="corr-label" style="color:var(--purple)">Pd</div>
          <div class="corr-label" style="color:var(--gold)">Au</div>
          ${corrCellHTML(1, '226,176,74')}
          ${corrCellHTML(cGS, '226,176,74')}
          ${corrCellHTML(cGPt, '226,176,74')}
          ${corrCellHTML(cGPd, '226,176,74')}
          <div class="corr-label" style="color:var(--silver)">Ag</div>
          ${corrCellHTML(cGS, '141,155,176')}
          ${corrCellHTML(1, '141,155,176')}
          ${corrCellHTML(cSPt, '141,155,176')}
          ${corrCellHTML(cSPd, '141,155,176')}
          <div class="corr-label" style="color:var(--teal)">Pt</div>
          ${corrCellHTML(cGPt, '62,207,178')}
          ${corrCellHTML(cSPt, '62,207,178')}
          ${corrCellHTML(1, '62,207,178')}
          ${corrCellHTML(cPtPd, '62,207,178')}
          <div class="corr-label" style="color:var(--purple)">Pd</div>
          ${corrCellHTML(cGPd, '176,122,255')}
          ${corrCellHTML(cSPd, '176,122,255')}
          ${corrCellHTML(cPtPd, '176,122,255')}
          ${corrCellHTML(1, '176,122,255')}
        </div>
      </div>

      <div class="acard">
        <div class="acard-title">Market Commentary</div>
        <div class="acard-sub">What the data is saying</div>
        <div class="editorial">
          <div class="editorial-label">Price Action</div>
          <div class="editorial-text">Gold peaked in <b>${peakMonth}</b> at <b>$${fmt(gs.max)}</b>, then ${gs.last < gs.max ? 'declined' : 'held near'} <b>${Math.abs(((gs.last - gs.max) / gs.max) * 100).toFixed(0)}%</b> from the peak. The sharpest single-day drop was <b>${drop.pct.toFixed(2)}%</b> on ${drop.date.substring(5).replace('-', ' ')}.</div>
        </div>
        <div class="editorial">
          <div class="editorial-label">Market Structure</div>
          <div class="editorial-text">${strongest.pair} move almost in lockstep (<b>${strongest.val.toFixed(2)} correlation</b>), while ${weakest.pair} show the weakest link at just <b>${weakest.val.toFixed(2)}</b>.</div>
        </div>
        <div class="editorial">
          <div class="editorial-label">Currency Lens</div>
          <div class="editorial-text">Gold returned <b>${fmtPct(retUSD)} in USD</b> but <b>${fmtPct(bestCurr.ret)} in ${bestCurr.code}</b> year to date. ${retUSD < bestCurr.ret ? 'Dollar strength absorbed part of the real rally for non-US investors.' : 'Dollar weakness amplified returns for US investors.'}</div>
        </div>
      </div>

      <div class="acard">
        <div class="acard-title">Gold Returns by Currency</div>
        <div class="acard-sub">Same commodity, different story</div>
        ${currReturns.map(c => `
          <div class="curr-item">
            <span class="curr-code">${c.code}</span>
            <div class="curr-track"><div class="curr-fill" style="width:${(c.ret / maxRet * 100).toFixed(0)}%;background:${c.color}"></div></div>
            <span class="curr-pct" style="color:var(--green)">${fmtPct(c.ret)}</span>
          </div>
        `).join('')}
        <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">
          <div class="ks-row"><span class="ks-l">Most volatile month</span><span class="ks-v" style="color:var(--gold)">${vol.month}</span></div>
          <div class="ks-row"><span class="ks-l">${vol.month} price range</span><span class="ks-v">$${fmt(vol.range)}</span></div>
          <div class="ks-row"><span class="ks-l">Avg daily move</span><span class="ks-v">${dailyMove.toFixed(2)}%</span></div>
          <div class="ks-row"><span class="ks-l">Biggest drop</span><span class="ks-v" style="color:var(--red)">${drop.pct.toFixed(2)}%</span></div>
        </div>
      </div>
    </div>`;

    document.getElementById('dashboard').innerHTML = html;
    drawChart(data);
    setupChartHover();
    window.addEventListener('resize', () => drawChart(data));

  } catch (err) {
    document.getElementById('dashboard').innerHTML =
      `<div class="loading" style="color:var(--red)">Failed to load data. ${err.message}</div>`;
  }
}

init();
</script>
</body>
</html>
